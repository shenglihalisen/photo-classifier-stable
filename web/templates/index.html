<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片自动分类工具</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.21/dist/css/layui.css">
    <style>
        :root{--pri:#4a6cf7;--pri-d:#3a56d4;--red:#ef4444;--grn:#22c55e;--org:#f59e0b}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f5f7fa;color:#333;min-height:100vh}
        .header{background:linear-gradient(135deg,#4a6cf7,#6366f1);color:#fff;padding:28px 40px}
        .header h1{font-size:26px;font-weight:600}
        .header p{font-size:15px;opacity:.85;margin-top:6px}
        .container{max-width:1200px;margin:0 auto;padding:28px 24px}
        .card{background:#fff;border-radius:12px;padding:28px 32px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
        .card-title{font-size:18px;font-weight:600;margin-bottom:20px;color:#1a1a2e}

        /* Tab */
        .tab-bar{display:flex;border-bottom:2px solid #eee;margin-bottom:20px}
        .tab-item{padding:12px 28px;font-size:15px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:#888;transition:all .2s}
        .tab-item:hover{color:var(--pri)}
        .tab-item.active{color:var(--pri);border-bottom-color:var(--pri);font-weight:600}
        .tab-content{display:none}
        .tab-content.active{display:block}

        /* 上传区 */
        .upload-zone{border:2px dashed #d0d5dd;border-radius:12px;padding:50px 30px;text-align:center;cursor:pointer;transition:all .3s;background:#fafbfc}
        .upload-zone:hover{border-color:var(--pri);background:#f0f4ff}
        .upload-zone.dragover{border-color:var(--pri);background:#e8edff;border-style:solid;transform:scale(1.01);box-shadow:0 0 20px rgba(74,108,247,.2)}
        .upload-zone .icon{font-size:52px;color:#c0c5ce;margin-bottom:14px}
        .upload-zone .title{font-size:18px;color:#333;font-weight:500;margin-bottom:8px}
        .upload-zone .desc{font-size:14px;color:#888}
        .upload-zone input[type="file"]{display:none}

        /* 文件标签 */
        .file-tag{display:inline-flex;align-items:center;gap:6px;background:#eef2ff;padding:6px 14px;border-radius:20px;font-size:13px;color:#4a6cf7;margin:0 6px 6px 0}
        .file-tag .x{cursor:pointer;color:#999;font-weight:bold}
        .file-tag .x:hover{color:var(--red)}

        /* 按钮 */
        .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 28px;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s}
        .btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:var(--pri-d);box-shadow:0 4px 12px rgba(74,108,247,.35)}
        .btn-grn{background:var(--grn);color:#fff}.btn-grn:hover{opacity:.9}
        .btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.9}
        .btn-org{background:var(--org);color:#fff}.btn-org:hover{opacity:.9}
        .btn-out{background:#fff;border:2px solid var(--pri);color:var(--pri)}.btn-out:hover{background:var(--pri);color:#fff}
        .btn:disabled{opacity:.5;cursor:not-allowed}

        /* 模式 */
        .mode-bar{display:flex;gap:10px;margin:18px 0;align-items:center}
        .mode-bar span{font-size:14px;color:#666}
        .mode-btn{padding:8px 20px;border:2px solid #e0e0e0;border-radius:6px;background:#fff;font-size:14px;cursor:pointer;transition:all .2s}
        .mode-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}

        /* 进度 */
        .progress-wrap{margin:18px 0;display:none}
        .progress-bar{height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--pri),#6366f1);width:0%;transition:width .3s}
        .progress-text{font-size:14px;color:#888;margin-top:8px}

        /* 统计 */
        .stats{display:flex;gap:20px;margin-bottom:24px}
        .stat-box{flex:1;text-align:center;padding:22px 16px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
        .stat-box .num{font-size:40px;font-weight:700}
        .stat-box .label{font-size:14px;color:#888;margin-top:4px}
        .stat-box.t .num{color:var(--pri)}.stat-box.n .num{color:var(--grn)}.stat-box.d .num{color:var(--red)}

        /* 操作栏 */
        .action-bar{display:flex;align-items:center;gap:12px;padding:14px 20px;background:#fff;border-radius:12px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.05);flex-wrap:wrap}
        .action-bar label{display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer}

        /* 照片 */
        .section-title{font-size:18px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #eee;display:flex;align-items:center;gap:10px}
        .badge{display:inline-block;padding:2px 12px;border-radius:12px;font-size:13px;color:#fff}
        .badge.red{background:var(--red)}.badge.grn{background:var(--grn)}.badge.org{background:var(--org)}
        .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;margin-bottom:28px}
        .photo-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s;position:relative;cursor:pointer}
        .photo-card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.12)}
        .photo-card .thumb{width:100%;height:160px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .photo-card .thumb img{width:100%;height:100%;object-fit:cover}
        .photo-card .thumb .no-img{color:#ccc;font-size:14px}
        .photo-card .info{padding:12px 14px}
        .photo-card .fname{font-size:13px;font-weight:500;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .photo-card .fdesc{font-size:12px;color:#999;margin-top:4px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .photo-card .fconf{font-size:12px;color:var(--red);margin-top:4px;font-weight:500}
        .photo-card .cb{position:absolute;top:10px;left:10px;width:20px;height:20px;z-index:2;cursor:pointer}
        .photo-card .ncb{position:absolute;top:10px;left:10px;width:18px;height:18px;z-index:2;cursor:pointer;border:2px solid #ccc;border-radius:4px;background:#fff;display:none}
        .photo-card:hover .ncb{display:block}
        .photo-card .ncb:checked{background:var(--grn);border-color:var(--grn)}
        .photo-card .remove-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;border:none;border-radius:50%;background:rgba(239,68,68,.85);color:#fff;font-size:18px;cursor:pointer;z-index:3;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
        .photo-card:hover .remove-btn{opacity:1}
        .photo-card .dl-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;border:none;border-radius:50%;background:rgba(74,108,247,.85);color:#fff;font-size:14px;cursor:pointer;z-index:3;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;text-decoration:none}
        .photo-card:hover .dl-btn{opacity:1}
        .photo-card .dl-btn:hover{background:rgba(74,108,247,1);transform:scale(1.1)}

        /* 重复组 */
        .dup-group{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:18px;margin-bottom:18px}
        .dup-group-title{font-size:15px;font-weight:600;color:#92400e;margin-bottom:12px}

        /* 预览面板 */
        .preview-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);z-index:1000;display:none;align-items:center;justify-content:center}
        .preview-mask.show{display:flex}
        .preview-box{background:#fff;border-radius:16px;width:94%;max-width:1400px;max-height:92vh;display:flex;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
        .preview-left{flex:1;background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:500px;position:relative;overflow:hidden}
        .preview-left img{max-width:100%;max-height:88vh;object-fit:contain}
        .preview-close{position:absolute;top:12px;right:12px;width:36px;height:36px;border:none;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;font-size:22px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center}
        .preview-close:hover{background:rgba(255,255,255,.4)}
        .preview-zoom-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2}
        .preview-zoom-bar button{width:36px;height:36px;border:none;border-radius:8px;background:rgba(255,255,255,.25);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
        .preview-zoom-bar button:hover{background:rgba(255,255,255,.45)}
        .preview-zoom-bar .zoom-pct{color:#fff;font-size:13px;display:flex;align-items:center;padding:0 8px;text-shadow:0 1px 3px rgba(0,0,0,.5)}
        .preview-right{width:320px;padding:28px;display:flex;flex-direction:column;border-left:1px solid #eee;overflow-y:auto}
        .preview-right h3{font-size:16px;font-weight:600;margin-bottom:16px;color:#1a1a2e}
        .preview-row{font-size:13px;color:#666;margin-bottom:8px;line-height:1.6}
        .preview-row b{color:#333}
        .preview-defect{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fef2f2;border-radius:8px;margin-bottom:6px;font-size:13px}
        .preview-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .preview-dtext{flex:1;color:#333}
        .preview-dconf{color:var(--red);font-weight:500;font-size:12px}
        .preview-ok-tag{display:inline-block;padding:6px 14px;background:#dcfce7;color:#166534;border-radius:6px;font-size:14px;margin:10px 0}
        .preview-actions{margin-top:auto;padding-top:16px}
        .preview-actions .btn{width:100%;justify-content:center;margin-bottom:8px}
        .preview-nav{display:flex;gap:8px;margin-top:8px}
        .preview-nav .btn{flex:1;font-size:13px;padding:8px 12px}

        .error-box{background:#fef2f2;color:var(--red);padding:14px 18px;border-radius:8px;margin-bottom:16px;font-size:14px;border-left:4px solid var(--red);display:none}
        .error-box.show{display:block}
        .hidden{display:none!important}
    </style>
</head>
<body>

<div class="header">
    <h1>&#128247; 照片自动分类工具</h1>
    <p>智能检测损坏、空镜、闭眼、模糊、遮挡、曝光异常、噪点等缺陷照片，一键整理您的相册</p>
</div>

<div class="container">
    <div class="card">
        <div class="card-title">&#128194; 选择照片</div>
        <div class="tab-bar">
            <div class="tab-item active" data-tab="file">&#128206; 上传文件</div>
            <div class="tab-item" data-tab="folder">&#128193; 选择文件夹</div>
        </div>
        <div class="tab-content active" id="tabFile">
            <div class="upload-zone" id="fileZone">
                <div class="icon">&#128228;</div>
                <div class="title">点击选择文件，或拖拽文件到此处</div>
                <div class="desc">支持 JPG、PNG、GIF、BMP、WebP 格式，可多选</div>
                <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.gif,.bmp,.webp,image/*">
            </div>
        </div>
        <div class="tab-content" id="tabFolder">
            <div class="upload-zone" id="folderZone">
                <div class="icon">&#128193;</div>
                <div class="title">点击选择文件夹，或拖拽文件夹到此处</div>
                <div class="desc">将自动扫描文件夹中所有图片</div>
                <input type="file" id="folderInput" webkitdirectory directory multiple>
            </div>
        </div>
        <div class="hidden" id="selectedDiv" style="margin-top:16px">
            <span style="font-size:14px;color:#666">已选择 <b id="fileCount">0</b> 个文件：</span>
            <div id="fileList" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px"></div>
        </div>
        <div class="mode-bar">
            <span>扫描模式：</span>
            <button class="mode-btn active" id="autoBtn">自动模式</button>
            <button class="mode-btn" id="manualBtn">手动确认</button>
        </div>
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">准备中...</div>
        </div>
        <div style="margin-top:18px;display:flex;gap:12px">
            <button class="btn btn-pri" id="scanBtn" disabled>&#128269; 开始扫描</button>
        </div>
    </div>
    <div class="error-box" id="errorMsg"></div>
    <div class="stats hidden" id="statsBox">
        <div class="stat-box t"><div class="num" id="totalCount">0</div><div class="label">&#128247; 总照片数</div></div>
        <div class="stat-box n"><div class="num" id="normalCount">0</div><div class="label">&#128522; 正常照片</div></div>
        <div class="stat-box d"><div class="num" id="defectiveCount">0</div><div class="label">&#128542; 废片</div></div>
    </div>
    <div class="action-bar hidden" id="actionBar">
        <label style="margin-right:8px"><input type="checkbox" id="selectAllDefective"> 全选废片</label>
        <label style="margin-right:8px"><input type="checkbox" id="selectAllNormal"> 全选正常</label>
        <button class="btn btn-grn" id="moveBtn">&#128260; 移动废片</button>
        <button class="btn btn-red" id="deleteBtn">&#128465; 删除废片</button>
        <button class="btn btn-org" id="dupBtn">&#128203; 检测重复</button>
        <button class="btn btn-pri" id="downloadMultiBtn" style="background:#8b5cf6">&#128229; 多文件下载</button>
        <button class="btn btn-pri" id="downloadSelZipBtn" style="background:#6366f1">&#128230; 选中打包下载</button>
        <button class="btn btn-out" id="resetBtn">&#128260; 重新扫描</button>
    </div>
    <div id="resultsBox"></div>
</div>

<!-- 预览面板 -->
<div class="preview-mask" id="previewMask">
    <div class="preview-box">
        <div class="preview-left">
            <img id="previewImg" src="">
            <button class="preview-close" id="previewClose">&times;</button>
            <div class="preview-zoom-bar">
                <button id="zoomOut" title="缩小">−</button>
                <span class="zoom-pct" id="zoomPct">100%</span>
                <button id="zoomIn" title="放大">+</button>
                <button id="zoomFit" title="适应窗口">⊡</button>
            </div>
        </div>
        <div class="preview-right">
            <h3 id="previewTitle">照片详情</h3>
            <div id="previewInfo"></div>
            <div class="preview-actions">
                <button class="btn btn-grn" id="previewMarkNormal">&#9989; 标记为正常</button>
                <div class="preview-nav">
                    <button class="btn btn-out" id="previewPrev">&#9664; 上一张</button>
                    <button class="btn btn-out" id="previewNext">下一张 &#9654;</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/layui@2.9.21/dist/layui.min.js"></script>
<script>
layui.use(['layer'], function(){
    var layer = layui.layer;

    var selectedFiles = [];
    var currentMode = 'auto';
    var isScanning = false;
    var pollTimer = null;
    var scanResults = null;
    var csrfToken = '';
    var previewIndex = -1;
    var previewList = [];

    var defectNames = {'corrupted':'损坏','empty':'空镜','blink':'闭眼','blurry':'模糊','obstruction':'遮挡','exposure':'曝光异常','noisy':'噪点'};
    var defectColors = {'corrupted':'#ef4444','empty':'#f59e0b','blink':'#3b82f6','blurry':'#8b5cf6','obstruction':'#14b8a6','exposure':'#f97316','noisy':'#6b7280'};

    // ==================== CSRF ====================
    function loadCsrf() {
        return new Promise(function(resolve) {
            var x = new XMLHttpRequest();
            x.open('GET', '/api/csrf-token', true);
            x.onreadystatechange = function() {
                if(x.readyState === 4) {
                    try { var d = JSON.parse(x.responseText); if(d.csrf_token) csrfToken = d.csrf_token; } catch(e) {}
                    resolve();
                }
            };
            x.onerror = function() { resolve(); };
            x.send();
        });
    }
    loadCsrf();

    function apiPost(url, body, callback) {
        var x = new XMLHttpRequest();
        x.open('POST', url, true);
        x.setRequestHeader('X-CSRF-Token', csrfToken);
        if(!(body instanceof FormData)) x.setRequestHeader('Content-Type', 'application/json');
        x.onreadystatechange = function() {
            if(x.readyState === 4) {
                try { callback(null, JSON.parse(x.responseText)); }
                catch(e) { callback(e, null); }
            }
        };
        x.onerror = function() { callback(new Error('network'), null); };
        x.send(body instanceof FormData ? body : JSON.stringify(body));
    }

    function toast(m, i) { layer.msg(m, {icon: i||1, time: 2500, offset: '20px'}); }
    function showError(m) { var el = document.getElementById('errorMsg'); el.textContent = m; el.classList.add('show'); setTimeout(function(){el.classList.remove('show')}, 6000); }

    // ==================== Tab ====================
    document.querySelectorAll('.tab-item').forEach(function(t) {
        t.addEventListener('click', function() {
            document.querySelectorAll('.tab-item').forEach(function(x){x.classList.remove('active')});
            document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active')});
            this.classList.add('active');
            document.getElementById(this.getAttribute('data-tab') === 'file' ? 'tabFile' : 'tabFolder').classList.add('active');
        });
    });

    // ==================== 文件上传 ====================
    var fileZone = document.getElementById('fileZone');
    var fileInput = document.getElementById('fileInput');
    fileZone.addEventListener('click', function(){ fileInput.click(); });
    fileInput.addEventListener('change', function(e) { if(e.target.files.length) handleFiles(e.target.files); });
    fileZone.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); this.classList.add('dragover'); });
    fileZone.addEventListener('dragleave', function(e) { e.preventDefault(); this.classList.remove('dragover'); });
    fileZone.addEventListener('drop', function(e) {
        e.preventDefault(); e.stopPropagation(); this.classList.remove('dragover');
        if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
    });

    // ==================== 文件夹上传 ====================
    var folderZone = document.getElementById('folderZone');
    var folderInput = document.getElementById('folderInput');
    folderZone.addEventListener('click', function(){ folderInput.click(); });
    folderInput.addEventListener('change', function(e) { if(e.target.files.length) handleFiles(e.target.files); });
    folderZone.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); this.classList.add('dragover'); });
    folderZone.addEventListener('dragleave', function(e) { e.preventDefault(); this.classList.remove('dragover'); });
    folderZone.addEventListener('drop', function(e) {
        e.preventDefault(); e.stopPropagation(); this.classList.remove('dragover');
        // 由全局 drop handler 统一处理
    });

    // 递归读取文件夹内容
    function readEntry(entry, result, callback) {
        if(entry.isFile) {
            entry.file(function(f) {
                result.push(f);
                callback();
            }, callback);
        } else if(entry.isDirectory) {
            var reader = entry.createReader();
            var all = [];
            function readBatch() {
                reader.readEntries(function(entries) {
                    if(entries.length === 0) {
                        var pending = all.length;
                        if(pending === 0) { callback(); return; }
                        all.forEach(function(e) {
                            readEntry(e, result, function() {
                                pending--;
                                if(pending === 0) callback();
                            });
                        });
                    } else {
                        all = all.concat(Array.prototype.slice.call(entries));
                        readBatch();
                    }
                }, callback);
            }
            readBatch();
        } else {
            callback();
        }
    }

    // ==================== 全局拖拽：整页可拖入 ====================
    var dragCounter = 0;

    // 创建全局拖拽遮罩
    var dragOverlay = document.createElement('div');
    dragOverlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(74,108,247,.15);border:3px dashed var(--pri);z-index:9999;display:none;align-items:center;justify-content:center;pointer-events:none';
    dragOverlay.innerHTML = '<div style="background:#fff;padding:24px 40px;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.15);text-align:center"><div style="font-size:48px;margin-bottom:12px">&#128228;</div><div style="font-size:20px;font-weight:600;color:#333">松开鼠标上传照片</div><div style="font-size:14px;color:#888;margin-top:6px">支持文件和文件夹</div></div>';
    document.body.appendChild(dragOverlay);

    // 所有 dragover 必须 preventDefault，否则浏览器会打开文件
    document.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.stopPropagation();
        e.dataTransfer.dropEffect = 'copy';
    }, true);

    document.addEventListener('dragenter', function(e) {
        e.preventDefault();
        dragCounter++;
        if(dragCounter === 1) dragOverlay.style.display = 'flex';
    });

    document.addEventListener('dragleave', function(e) {
        e.preventDefault();
        dragCounter--;
        if(dragCounter <= 0) { dragCounter = 0; dragOverlay.style.display = 'none'; }
    });

    document.addEventListener('drop', function(e) {
        e.preventDefault();
        e.stopPropagation();
        dragCounter = 0;
        dragOverlay.style.display = 'none';

        var items = e.dataTransfer.items;
        if(items && items.length) {
            var allFiles = [];
            var pending = items.length;
            var hasDir = false;
            for(var i = 0; i < items.length; i++) {
                var entry = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
                if(entry) {
                    if(entry.isDirectory) hasDir = true;
                    readEntry(entry, allFiles, function() {
                        pending--;
                        if(pending === 0 && allFiles.length) handleFiles(allFiles);
                    });
                } else {
                    pending--;
                }
            }
            if(pending === 0 && allFiles.length) handleFiles(allFiles);
        } else if(e.dataTransfer.files.length) {
            handleFiles(e.dataTransfer.files);
        }
    }, true);

    // ==================== 文件处理 ====================
    function handleFiles(fileList) {
        var arr = Array.prototype.slice.call(fileList);
        var valid = [], errs = [];
        for(var i = 0; i < arr.length; i++) {
            var f = arr[i];
            var name = f.name.toLowerCase();
            // 按扩展名判断（覆盖点击选择、文件夹选择、拖拽所有场景）
            if(/\.(jpg|jpeg|png|gif|bmp|webp)$/.test(name)) {
                valid.push(f);
            } else {
                errs.push('跳过: ' + f.name);
            }
        }
        if(errs.length) showError(errs.slice(0, 3).join('；'));
        if(valid.length) { selectedFiles = valid; renderFiles(); }
    }

    function renderFiles() {
        var el = document.getElementById('fileList'), cnt = document.getElementById('fileCount'),
            wrap = document.getElementById('selectedDiv'), btn = document.getElementById('scanBtn');
        cnt.textContent = selectedFiles.length; el.innerHTML = '';
        if(selectedFiles.length) {
            wrap.classList.remove('hidden'); btn.disabled = false;
            selectedFiles.forEach(function(f, i) {
                var tag = document.createElement('span'); tag.className = 'file-tag';
                var nm = document.createElement('span'); nm.textContent = f.name.length > 20 ? f.name.substr(0,17)+'...' : f.name; nm.title = f.name; tag.appendChild(nm);
                var x = document.createElement('span'); x.className = 'x'; x.textContent = '\u00d7';
                x.addEventListener('click', function(e) { e.stopPropagation(); selectedFiles.splice(i, 1); renderFiles(); });
                tag.appendChild(x); el.appendChild(tag);
            });
        } else { wrap.classList.add('hidden'); btn.disabled = true; }
    }

    // ==================== 模式 ====================
    document.getElementById('autoBtn').addEventListener('click', function(){ currentMode='auto'; this.classList.add('active'); document.getElementById('manualBtn').classList.remove('active'); });
    document.getElementById('manualBtn').addEventListener('click', function(){ currentMode='manual'; this.classList.add('active'); document.getElementById('autoBtn').classList.remove('active'); });

    // ==================== 扫描 ====================
    document.getElementById('scanBtn').addEventListener('click', function() {
        if(!selectedFiles.length) { showError('请先选择照片'); return; }
        var go = function() {
            var fd = new FormData();
            selectedFiles.forEach(function(f) { fd.append('files', f); });
            apiPost('/api/scan', fd, function(err, d) {
                if(err || !d) { showError('请求失败'); return; }
                if(d.error) { showError(d.error); return; }
                beginScanUI(); toast(d.message||'扫描已启动', 1); pollStatus();
            });
        };
        if(!csrfToken) loadCsrf().then(go); else go();
    });

    function beginScanUI() {
        isScanning = true;
        document.getElementById('progressWrap').style.display = 'block';
        document.getElementById('scanBtn').disabled = true;
        document.getElementById('resultsBox').innerHTML = '';
        document.getElementById('statsBox').classList.add('hidden');
        document.getElementById('actionBar').classList.add('hidden');
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('progressText').textContent = '准备中...';
    }

    // ==================== 轮询 ====================
    function pollStatus() {
        if(pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(function() {
            var x = new XMLHttpRequest();
            x.open('GET', '/api/status', true);
            x.onreadystatechange = function() {
                if(x.readyState !== 4) return;
                var d; try { d = JSON.parse(x.responseText); } catch(e) { return; }
                if(!d) return;
                var pct = d.total > 0 ? Math.round(d.progress / d.total * 100) : 0;
                document.getElementById('progressFill').style.width = pct + '%';
                document.getElementById('progressText').textContent = '正在检测: ' + d.progress + ' / ' + d.total + ' - ' + (d.current_file || '');
                if(d.error) { showError('出错: ' + d.error); stopUI(); return; }
                if(!d.is_scanning) { stopUI(); if(d.completed) displayResults(d); }
            };
            x.send();
        }, 2000);
    }

    function stopUI() {
        isScanning = false; clearInterval(pollTimer); pollTimer = null;
        document.getElementById('progressWrap').style.display = 'none';
        document.getElementById('scanBtn').disabled = (selectedFiles.length === 0);
    }

    // ==================== 显示结果 ====================
    function displayResults(d) {
        scanResults = d;
        document.getElementById('totalCount').textContent = d.total;
        document.getElementById('normalCount').textContent = d.normal_count;
        document.getElementById('defectiveCount').textContent = d.defective_count;
        document.getElementById('statsBox').classList.remove('hidden');
        document.getElementById('actionBar').classList.remove('hidden');

        var box = document.getElementById('resultsBox'); box.innerHTML = '';

        // 构建预览列表（所有照片）
        previewList = [];
        if(d.defective_photos) {
            Object.keys(d.defective_photos).forEach(function(type) {
                d.defective_photos[type].forEach(function(p) {
                    previewList.push({ photo: p, isDefective: true });
                });
            });
        }
        if(d.normal_photos) {
            d.normal_photos.forEach(function(p) {
                previewList.push({ photo: p, isDefective: false });
            });
        }

        // 废片
        if(d.defective_count > 0) {
            var sec = document.createElement('div');
            sec.innerHTML = '<div class="section-title"><span style="color:var(--red)">&#128542;</span> 废片列表 <span class="badge red">' + d.defective_count + '</span></div><div id="defectiveGroups"></div>';
            box.appendChild(sec);
            var groups = document.getElementById('defectiveGroups');
            if(d.defective_photos) {
                Object.keys(d.defective_photos).forEach(function(type) {
                    var photos = d.defective_photos[type];
                    var g = document.createElement('div'); g.style.marginBottom = '20px';
                    var t = document.createElement('div'); t.className = 'section-title'; t.style.fontSize = '15px'; t.style.borderBottom = 'none'; t.style.paddingBottom = '0';
                    t.innerHTML = '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + defectColors[type] + '"></span> ' + (defectNames[type]||type) + ' (' + photos.length + '张)';
                    g.appendChild(t);
                    var grid = document.createElement('div'); grid.className = 'photo-grid';
                    photos.forEach(function(p, idx) { grid.appendChild(makeCard(p, true)); });
                    g.appendChild(grid); groups.appendChild(g);
                });
            }
        }

        // 正常
        if(d.normal_count > 0) {
            var sec2 = document.createElement('div');
            sec2.innerHTML = '<div class="section-title"><span style="color:var(--grn)">&#128522;</span> 正常照片 <span class="badge grn">' + d.normal_count + '</span></div><div class="photo-grid" id="normalGrid"></div>';
            box.appendChild(sec2);
            var grid2 = document.getElementById('normalGrid');
            d.normal_photos.forEach(function(p) { grid2.appendChild(makeCard(p, false)); });
        }
    }

    function makeCard(p, isDef) {
        var card = document.createElement('div'); card.className = 'photo-card'; card.setAttribute('data-path', p.path);

        // 点击打开预览
        card.addEventListener('click', function(e) {
            if(e.target.className === 'cb' || e.target.className === 'remove-btn' || e.target.className === 'x') return;
            openPreview(p.path);
        });

        if(isDef) {
            var cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'cb'; cb.setAttribute('data-path', p.path);
            cb.style.display = (currentMode === 'manual') ? 'block' : 'none';
            cb.addEventListener('click', function(e) { e.stopPropagation(); });
            card.appendChild(cb);
        }

        var thumb = document.createElement('div'); thumb.className = 'thumb';
        if(p.thumbnail) { var img = document.createElement('img'); img.src = p.thumbnail; img.loading = 'lazy'; thumb.appendChild(img); }
        else { var np = document.createElement('div'); np.className = 'no-img'; np.textContent = p.filename; thumb.appendChild(np); }
        card.appendChild(thumb);

        var info = document.createElement('div'); info.className = 'info';
        var fn = document.createElement('div'); fn.className = 'fname'; fn.textContent = p.filename; fn.title = p.path; info.appendChild(fn);
        if(isDef && p.description) {
            var fd = document.createElement('div'); fd.className = 'fdesc'; fd.textContent = p.description; info.appendChild(fd);
            var fc = document.createElement('div'); fc.className = 'fconf'; fc.textContent = '置信度: ' + Math.round(p.confidence*100) + '%'; info.appendChild(fc);
        }
        card.appendChild(info);

        // 正常照片添加复选框
        if(!isDef) {
            var ncb = document.createElement('input');
            ncb.type = 'checkbox';
            ncb.className = 'ncb';
            ncb.setAttribute('data-path', p.path);
            ncb.addEventListener('click', function(e) { e.stopPropagation(); });
            card.appendChild(ncb);
        }

        if(isDef) {
            var rb = document.createElement('button'); rb.className = 'remove-btn'; rb.textContent = '\u00d7';
            rb.addEventListener('click', function(e) {
                e.stopPropagation();
                markNormal(p.path);
            });
            card.appendChild(rb);
        }
        return card;
    }

    // ==================== 预览面板 ====================
    function openPreview(path) {
        for(var i = 0; i < previewList.length; i++) {
            if(previewList[i].photo.path === path) { previewIndex = i; break; }
        }
        renderPreview();
        document.getElementById('previewMask').classList.add('show');
    }

    function renderPreview() {
        if(previewIndex < 0 || previewIndex >= previewList.length) return;
        var item = previewList[previewIndex];
        var p = item.photo;

        // 切换图片时重置缩放
        previewZoom = 1;
        updateZoom();

        document.getElementById('previewImg').src = p.thumbnail || '';
        document.getElementById('previewTitle').textContent = p.filename;

        var info = document.getElementById('previewInfo');
        info.innerHTML = '';

        // 基本信息
        var row1 = document.createElement('div'); row1.className = 'preview-row'; row1.innerHTML = '<b>文件名:</b> ' + p.filename; info.appendChild(row1);
        var row2 = document.createElement('div'); row2.className = 'preview-row'; row2.innerHTML = '<b>路径:</b> <span style="font-size:11px;color:#999;word-break:break-all">' + p.path + '</span>'; info.appendChild(row2);

        if(item.isDefective) {
            // 缺陷信息
            var defects = [];
            if(scanResults && scanResults.defective_photos) {
                Object.keys(scanResults.defective_photos).forEach(function(type) {
                    scanResults.defective_photos[type].forEach(function(dp) {
                        if(dp.path === p.path) defects.push(dp);
                    });
                });
            }
            if(defects.length) {
                var dl = document.createElement('div'); dl.className = 'preview-defect-list';
                defects.forEach(function(d) {
                    var di = document.createElement('div'); di.className = 'preview-defect';
                    var dot = document.createElement('span'); dot.className = 'preview-dot'; dot.style.background = defectColors[d.defect_type] || '#999';
                    var txt = document.createElement('span'); txt.className = 'preview-dtext'; txt.textContent = defectNames[d.defect_type] || d.defect_type;
                    var conf = document.createElement('span'); conf.className = 'preview-dconf'; conf.textContent = Math.round(d.confidence * 100) + '%';
                    di.appendChild(dot); di.appendChild(txt); di.appendChild(conf); dl.appendChild(di);

                    // 描述
                    if(d.description) {
                        var desc = document.createElement('div'); desc.style.cssText = 'font-size:11px;color:#888;padding:2px 12px;margin-bottom:4px;line-height:1.4';
                        desc.textContent = d.description; dl.appendChild(desc);
                    }
                });
                info.appendChild(dl);
            }
        } else {
            var tag = document.createElement('div'); tag.className = 'preview-ok-tag'; tag.textContent = '&#9989; 此照片正常'; info.appendChild(tag);
        }

        // 标记按钮状态
        var markBtn = document.getElementById('previewMarkNormal');
        if(item.isDefective) {
            markBtn.style.display = '';
            markBtn.onclick = function() { markNormal(p.path); closePreview(); };
        } else {
            markBtn.style.display = 'none';
        }
    }

    document.getElementById('previewClose').addEventListener('click', closePreview);
    document.getElementById('previewMask').addEventListener('click', function(e) { if(e.target === this) closePreview(); });

    function closePreview() {
        document.getElementById('previewMask').classList.remove('show');
        previewZoom = 1;
        updateZoom();
    }

    // ==================== 预览缩放 ====================
    var previewZoom = 1;
    var previewImg = document.getElementById('previewImg');
    var zoomPctEl = document.getElementById('zoomPct');

    function updateZoom() {
        previewImg.style.transform = 'scale(' + previewZoom + ')';
        previewImg.style.transformOrigin = 'center center';
        zoomPctEl.textContent = Math.round(previewZoom * 100) + '%';
    }

    function zoomIn() { previewZoom = Math.min(5, previewZoom * 1.25); updateZoom(); }
    function zoomOut() { previewZoom = Math.max(0.1, previewZoom / 1.25); updateZoom(); }
    function zoomFit() { previewZoom = 1; updateZoom(); }

    document.getElementById('zoomIn').addEventListener('click', zoomIn);
    document.getElementById('zoomOut').addEventListener('click', zoomOut);
    document.getElementById('zoomFit').addEventListener('click', zoomFit);

    // 滚轮缩放
    document.getElementById('previewImg').addEventListener('wheel', function(e) {
        e.preventDefault();
        if(e.deltaY < 0) zoomIn(); else zoomOut();
    });

    // 打开预览时重置缩放
    var origOpenPreview = openPreview;
    openPreview = function(path) {
        previewZoom = 1;
        updateZoom();
        origOpenPreview(path);
    };

    document.getElementById('previewPrev').addEventListener('click', function() {
        if(previewIndex > 0) { previewIndex--; renderPreview(); }
    });
    document.getElementById('previewNext').addEventListener('click', function() {
        if(previewIndex < previewList.length - 1) { previewIndex++; renderPreview(); }
    });

    // 键盘左右箭头
    document.addEventListener('keydown', function(e) {
        if(!document.getElementById('previewMask').classList.contains('show')) return;
        if(e.key === 'ArrowLeft' && previewIndex > 0) { previewIndex--; renderPreview(); }
        if(e.key === 'ArrowRight' && previewIndex < previewList.length - 1) { previewIndex++; renderPreview(); }
        if(e.key === 'Escape') closePreview();
    });

    // ==================== 标记正常 ====================
    function markNormal(path) {
        apiPost('/api/remove-defect', { path: path }, function(err, d) {
            if(err || !d) return;
            if(d.message) {
                toast('已标记为正常', 1);
                // 直接在本地移动，不重新扫描
                movePhotoToNormal(path);
            }
        });
    }

    function movePhotoToNormal(path) {
        if(!scanResults) return;

        // 从 defective_photos 中移除
        var removedPhoto = null;
        if(scanResults.defective_photos) {
            Object.keys(scanResults.defective_photos).forEach(function(type) {
                var arr = scanResults.defective_photos[type];
                for(var i = arr.length - 1; i >= 0; i--) {
                    if(arr[i].path === path) {
                        removedPhoto = arr[i];
                        arr.splice(i, 1);
                        if(arr.length === 0) delete scanResults.defective_photos[type];
                    }
                }
            });
        }

        if(!removedPhoto) return;

        // 添加到 normal_photos
        if(!scanResults.normal_photos) scanResults.normal_photos = [];
        scanResults.normal_photos.push(removedPhoto);

        // 更新计数
        scanResults.defective_count--;
        scanResults.normal_count++;
        scanResults.total = scanResults.normal_count + scanResults.defective_count;

        // 更新预览列表
        for(var i = 0; i < previewList.length; i++) {
            if(previewList[i].photo.path === path) {
                previewList[i].isDefective = false;
                break;
            }
        }

        // 重新渲染
        displayResults(scanResults);
        toast('已移至正常列表', 1);
    }

    // ==================== 全选 ====================
    document.getElementById('selectAllDefective').addEventListener('change', function() {
        var cbs = document.querySelectorAll('.photo-card .cb');
        for(var i = 0; i < cbs.length; i++) cbs[i].checked = this.checked;
    });
    document.getElementById('selectAllNormal').addEventListener('change', function() {
        var cbs = document.querySelectorAll('.photo-card .ncb');
        for(var i = 0; i < cbs.length; i++) cbs[i].checked = this.checked;
    });

    function getSelected() {
        var cbs = document.querySelectorAll('.photo-card .cb:checked'), arr = [];
        for(var i = 0; i < cbs.length; i++) arr.push(cbs[i].getAttribute('data-path'));
        return arr;
    }
    function getSelectedNormal() {
        var cbs = document.querySelectorAll('.photo-card .ncb:checked'), arr = [];
        for(var i = 0; i < cbs.length; i++) arr.push(cbs[i].getAttribute('data-path'));
        return arr;
    }

    // ==================== 多文件下载（逐个触发） ====================
    document.getElementById('downloadMultiBtn').addEventListener('click', function() {
        var sel = getSelectedNormal();
        if(!sel.length) { toast('请先在正常照片中勾选要下载的文件', 7); return; }
        toast('开始下载 ' + sel.length + ' 个文件', 1);
        sel.forEach(function(path, i) {
            setTimeout(function() {
                var a = document.createElement('a');
                a.href = '/api/download?path=' + encodeURIComponent(path);
                a.download = '';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }, i * 300); // 间隔 300ms 避免浏览器拦截
        });
    });

    // ==================== 选中打包下载 ====================
    document.getElementById('downloadSelZipBtn').addEventListener('click', function() {
        var sel = getSelectedNormal();
        if(!sel.length) { toast('请先在正常照片中勾选要下载的文件', 7); return; }
        toast('正在打包 ' + sel.length + ' 个文件，请稍候...', 1);
        // 通过 POST 发送选中路径，后端返回 zip
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/download-zip-selected', true);
        xhr.responseType = 'arraybuffer';
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('X-CSRF-Token', csrfToken);
        xhr.onreadystatechange = function() {
            if(xhr.readyState === 4 && xhr.status === 200) {
                var blob = new Blob([xhr.response], {type: 'application/zip'});
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'selected_photos.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        };
        xhr.send(JSON.stringify({ paths: sel }));
    });

    // ==================== 移动废片 ====================
    document.getElementById('moveBtn').addEventListener('click', function() {
        var sel = getSelected();
        if(!sel.length) { toast('没有选中的废片', 7); return; }
        layer.confirm('确定移动 ' + sel.length + ' 张废片？', {icon:3,title:'确认'}, function(idx) {
            layer.close(idx);
            apiPost('/api/process', {action:'move',mode:currentMode,folder_path:'',selected:sel}, function(err,d) {
                if(err||!d) return; if(d.error){showError(d.error);return;}
                toast(d.message||'移动成功', 1); setTimeout(function(){ doRescan(); }, 800);
            });
        });
    });

    // ==================== 删除废片 ====================
    document.getElementById('deleteBtn').addEventListener('click', function() {
        var sel = getSelected();
        if(!sel.length) { toast('没有选中的废片', 7); return; }
        apiPost('/api/delete-token', {selected:sel}, function(err, d) {
            if(err||!d) return; if(d.error){showError(d.error);return;}
            layer.confirm('确定删除 ' + sel.length + ' 张废片？', {icon:2,title:'危险操作'}, function(idx) {
                layer.close(idx);
                apiPost('/api/process', {action:'delete',mode:currentMode,folder_path:'',selected:sel,delete_token:d.delete_token}, function(err2,d2) {
                    if(err2||!d2) return; if(d2.error){showError(d2.error);return;}
                    toast(d2.message||'删除成功', 1); setTimeout(function(){ doRescan(); }, 800);
                });
            });
        });
    });

    // ==================== 检测重复 ====================
    document.getElementById('dupBtn').addEventListener('click', function() {
        apiPost('/api/duplicates', {}, function(err,d) {
            if(err||!d) return; if(d.error){showError(d.error);return;}
            toast(d.message||'开始检测', 1);
            document.getElementById('progressWrap').style.display = 'block';
            pollStatus();
        });
    });

    // ==================== 重新扫描 ====================
    document.getElementById('resetBtn').addEventListener('click', function() {
        selectedFiles = []; renderFiles();
        document.getElementById('resultsBox').innerHTML = '';
        document.getElementById('statsBox').classList.add('hidden');
        document.getElementById('actionBar').classList.add('hidden');
        document.getElementById('progressWrap').style.display = 'none';
    });

    // 重新扫描当前文件
    function doRescan() {
        if(selectedFiles.length) {
            var fd = new FormData();
            selectedFiles.forEach(function(f) { fd.append('files', f); });
            apiPost('/api/scan', fd, function(err, d) {
                if(!err && d && !d.error) { beginScanUI(); pollStatus(); }
            });
        }
    }
});
</script>
</body>
</html>
